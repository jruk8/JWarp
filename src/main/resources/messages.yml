messages-version: 4

prefix: "<dark_gray>[<aqua>JWarp<dark_gray>] "

command:
  player-only: "{prefix}<red>Only players can use this command."

warp:
  usage: "{prefix}<yellow>Usage: /warp <warp-name>"
  no-permission: "{prefix}<red>You do not have permission to use /warp."
  missing: "{prefix}<red>Warp <yellow>{warp}<red> was not found."
  permission-required: "{prefix}<red>This warp requires <yellow>{permission}<red>."
  cooldown: "{prefix}<red>Wait <yellow>{seconds}s<red> before warping again."
  invalid-world: "{prefix}<red>Warp <yellow>{warp}<red> points to a missing world."
  teleported: "{prefix}<green>Teleported to <yellow>{warp}<green>."
  actionbar: "<yellow>Warping to <white>{warp}<yellow>"

warps:
  no-permission: "{prefix}<red>You do not have permission to use /warps."
  empty: "{prefix}<yellow>There are no warps configured."
  header: "{prefix}<yellow>Available warps (<white>{count}<yellow>):"
  list: "{prefix}<white>{warps}"

jwarp:
  usage: "{prefix}<yellow>Usage: /jwarp <reload|delwarp|setwarp|redefine|setpermission|bypass|info|version>"
  help:
    header: "{prefix}<yellow>JWarp commands:"
    alias: "{prefix}<gray>/jw is a shorthand for /jwarp."
    commands: "{prefix}<yellow>Available commands:"
    command-line: "{prefix}<white>{command}"
    warps: "{prefix}<yellow>Warps: <white>{warps}"
  reload:
    usage: "{prefix}<yellow>Usage: /jwarp reload"
    no-permission: "{prefix}<red>You do not have permission to reload JWarp."
    success: "{prefix}<green>Reloaded config.yml and messages.yml."
  delwarp:
    usage: "{prefix}<yellow>Usage: /jwarp delwarp <warp-name>"
    no-permission: "{prefix}<red>You do not have permission to delete warps."
    missing: "{prefix}<red>Warp <yellow>{warp}<red> was not found."
    success: "{prefix}<green>Deleted warp <yellow>{warp}<green>."
  setwarp:
    usage: "{prefix}<yellow>Usage: /jwarp setwarp <warp-name>"
    no-permission: "{prefix}<red>You do not have permission to create warps."
    exists: "{prefix}<red>Warp <yellow>{warp}<red> already exists. Use <yellow>/jwarp redefine {warp}<red> instead."
    success: "{prefix}<green>Created warp <yellow>{warp}<green>."
  redefine:
    usage: "{prefix}<yellow>Usage: /jwarp redefine <warp-name>"
    no-permission: "{prefix}<red>You do not have permission to redefine warps."
    missing: "{prefix}<red>Warp <yellow>{warp}<red> was not found."
    success: "{prefix}<green>Redefined warp <yellow>{warp}<green>."
  setpermission:
    usage: "{prefix}<yellow>Usage: /jwarp setpermission <warp-name> <true/false>"
    no-permission: "{prefix}<red>You do not have permission to change warp permissions."
    missing: "{prefix}<red>Warp <yellow>{warp}<red> was not found."
    enabled: "{prefix}<green>Set permission to <yellow>{permission}<green>."
    disabled: "{prefix}<green>Disabled the permission requirement for <yellow>{warp}<green>."
  bypass:
    usage: "{prefix}<yellow>Usage: /jwarp bypass"
    no-permission: "{prefix}<red>You do not have permission to toggle bypass."
    enabled: "{prefix}<green>Bypass enabled."
    disabled: "{prefix}<yellow>Bypass disabled."
  info:
    usage: "{prefix}<yellow>Usage: /jwarp info <warp>"
    no-permission: "{prefix}<red>You do not have permission to view warp info."
    missing: "{prefix}<red>Warp <yellow>{warp}<red> was not found."
    header: "{prefix}<yellow>Info for <white>{warp}<yellow>:"
    world: "{prefix}<gray>World: <white>{world}"
    position: "{prefix}<gray>Position: <white>{x}, {y}, {z}"
    permission: "{prefix}<gray>Permission: <white>{permission}"
  version:
    usage: "{prefix}<yellow>Usage: /jwarp version"
    no-permission: "{prefix}<red>You do not have permission to view the version."
    message: "{prefix}<green>JWarp <white>{version}<green> on <white>{server}<green>. Java <white>{java}<green>."
